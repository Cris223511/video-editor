<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-circle.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Video Editor · Edita tus videos en el navegador</title>
    <meta
      name="description"
      content="Editor de video gratuito que funciona dentro del navegador: línea de tiempo con varios niveles, transiciones, corrección de color, censura en movimiento, texto y exportación. Tus archivos nunca salen de tu equipo."
    />
    <meta name="author" content="Cris223511" />
    <meta name="theme-color" content="#1861ff" />
    <link rel="canonical" href="https://video-editor-plus.vercel.app/" />

    <!-- tarjeta para cuando alguien comparte el enlace en redes o mensajería.
         la imagen es el propio logo, cuadrado, así que la tarjeta va en formato
         resumen en lugar del panorámico, que lo recortaría por los lados -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Video Editor" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:url" content="https://video-editor-plus.vercel.app/" />
    <meta property="og:title" content="Video Editor · Edita tus videos en el navegador" />
    <meta
      property="og:description"
      content="Monta la línea de tiempo, corrige el color, censura lo que se mueve y exporta el resultado. Todo en el navegador, sin instalar nada y sin subir tus videos a ningún servidor."
    />
    <meta property="og:image" content="https://video-editor-plus.vercel.app/logo.png" />
    <meta property="og:image:width" content="749" />
    <meta property="og:image:height" content="743" />
    <meta property="og:image:alt" content="Logo de Video Editor" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Video Editor · Edita tus videos en el navegador" />
    <meta
      name="twitter:description"
      content="Monta la línea de tiempo, corrige el color, censura lo que se mueve y exporta el resultado. Todo en el navegador, sin instalar nada y sin subir tus videos a ningún servidor."
    />
    <meta name="twitter:image" content="https://video-editor-plus.vercel.app/logo.png" />
    <script>
      // el tema se aplica antes de pintar para evitar el parpadeo del cambio
      // claro/oscuro al recargar. por defecto arranca en claro
      (function () {
        try {
          var guardado = localStorage.getItem('ve-theme')
          var oscuro = guardado === 'dark'
          document.documentElement.classList.toggle('dark', oscuro)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
