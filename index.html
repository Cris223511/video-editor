<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-circle.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Editor</title>
    <script>
      // el tema se aplica antes de pintar para evitar el parpadeo del cambio
      // claro/oscuro al recargar. por defecto arranca en oscuro
      (function () {
        try {
          var guardado = localStorage.getItem('ve-theme')
          var oscuro = guardado ? guardado === 'dark' : true
          document.documentElement.classList.toggle('dark', oscuro)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
